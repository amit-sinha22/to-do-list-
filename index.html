<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f4efe7, #d8e7f5);
      --card: #fffaf4;
      --text: #1f2933;
      --muted: #52606d;
      --accent: #d96c3d;
      --accent-dark: #b85227;
      --border: #e6d6c8;
      --done: #7b8f6a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(100%, 680px);
      background: rgba(255, 250, 244, 0.94);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 60px rgba(50, 50, 50, 0.12);
      overflow: hidden;
    }

    .hero {
      padding: 28px 28px 20px;
      background:
        radial-gradient(circle at top left, rgba(217, 108, 61, 0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(123, 143, 106, 0.16), transparent 30%);
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .content {
      padding: 24px 28px 28px;
    }

    .task-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .add-button {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .add-button:hover {
      background: var(--accent-dark);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .task-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done);
    }

    .task-text {
      font-size: 1rem;
      word-break: break-word;
    }

    .empty-state {
      margin: 0;
      padding: 22px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.6);
    }

    .remove-button {
      background: #fbe2d8;
      color: #8a3d1f;
    }

    .toggle {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }

    @media (max-width: 560px) {
      .task-form {
        grid-template-columns: 1fr;
      }

      .meta {
        flex-direction: column;
        align-items: flex-start;
      }

      .task-item {
        grid-template-columns: auto 1fr;
      }

      .remove-button {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>To-Do App</h1>
      <p class="subtitle">A simple browser version of your task list.</p>
    </section>

    <section class="content">
      <form class="task-form" id="task-form">
        <input id="task-input" type="text" placeholder="Enter a task" autocomplete="off">
        <button class="add-button" type="submit">Add Task</button>
      </form>

      <div class="meta">
        <span id="task-count">0 tasks</span>
        <span>Open this file directly in your browser</span>
      </div>

      <ul class="task-list" id="task-list"></ul>
      <p class="empty-state" id="empty-state">No tasks yet. Add your first one above.</p>
    </section>
  </main>

  <script>
    const form = document.getElementById("task-form");
    const taskInput = document.getElementById("task-input");
    const taskList = document.getElementById("task-list");
    const taskCount = document.getElementById("task-count");
    const emptyState = document.getElementById("empty-state");

    const tasks = [];

    function updateTaskCount() {
      const total = tasks.length;
      taskCount.textContent = total === 1 ? "1 task" : `${total} tasks`;
      emptyState.style.display = total === 0 ? "block" : "none";
    }

    function renderTasks() {
      taskList.innerHTML = "";

      tasks.forEach((task, index) => {
        const item = document.createElement("li");
        item.className = `task-item${task.done ? " done" : ""}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "toggle";
        checkbox.checked = task.done;
        checkbox.addEventListener("change", () => {
          task.done = checkbox.checked;
          renderTasks();
        });

        const text = document.createElement("span");
        text.className = "task-text";
        text.textContent = task.text;

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "remove-button";
        removeButton.textContent = "Remove";
        removeButton.addEventListener("click", () => {
          tasks.splice(index, 1);
          renderTasks();
        });

        item.appendChild(checkbox);
        item.appendChild(text);
        item.appendChild(removeButton);
        taskList.appendChild(item);
      });

      updateTaskCount();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const text = taskInput.value.trim();
      if (!text) {
        return;
      }

      tasks.push({ text, done: false });
      taskInput.value = "";
      renderTasks();
      taskInput.focus();
    });

    updateTaskCount();
  </script>
</body>
</html>
